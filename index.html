<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasker | Premium Task Management</title>
    <meta name="description" content="A premium, sleek task manager to organize your life with ease.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tasker</h1>
            <p>Manage your time with elegance.</p>
        </header>

        <section class="task-form-container">
            <form id="task-form">
                <div class="input-group">
                    <input type="text" id="task-title" placeholder="What needs to be done?" required>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="task-due-date">Due Date</label>
                        <input type="date" id="task-due-date" required>
                    </div>
                    <button type="submit" id="add-task-btn">Add Task</button>
                </div>
            </form>
        </section>

        <section class="controls">
            <div class="sort-controls">
                <span>Sort by:</span>
                <button class="sort-btn active" data-sort="date">Due Date</button>
                <button class="sort-btn" data-sort="priority">Priority</button>
            </div>
            <div class="stats">
                <span id="task-count">0 tasks</span>
            </div>
        </section>

        <main>
            <ul id="task-list" class="task-list">
                <!-- Tasks will be injected here by JS -->
            </ul>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Edit Task</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-task-id">
                <div class="input-group">
                    <label for="edit-task-title">Title</label>
                    <input type="text" id="edit-task-title" required>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="edit-task-priority">Priority</label>
                        <select id="edit-task-priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="edit-task-due-date">Due Date</label>
                        <input type="date" id="edit-task-due-date" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="close-modal" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
